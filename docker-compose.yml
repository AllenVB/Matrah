services:
  postgres:
    image: postgres:15-alpine
    container_name: matrah_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: matrah_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - matrah-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d matrah_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: matrah_backend
    ports:
      - "8081:8080"
    environment:
      # Veritabanı ayarları
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=matrah_db
      - DB_USER=postgres
      - DB_PASSWORD=password
      # ai-service URL (Docker iç network)
      - AI_SERVICE_URL=http://ai-service:8000/analyze
      - JWT_SECRET=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      # GCP kimlik bilgileri
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials.json
    volumes:
      # GCP servis hesabı anahtarı
      - ./backend/src/main/resources/gcp-key.json:/app/credentials.json:ro
      # Backend ve ai-service aynı upload dizinini paylaşır
      - uploads_data:/tmp/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - matrah-network

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: matrah_ai_service
    ports:
      - "8000:8000"
    environment:
      - GCP_PROJECT_ID=matrah-1089451526724
      - GCP_LOCATION=eu
      - GCP_PROCESSOR_ID=611ab0a51200a131
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials.json
    volumes:
      # GCP servis hesabı anahtarı
      - ./backend/src/main/resources/gcp-key.json:/app/credentials.json:ro
      # Backend ile paylaşılan upload dizini
      - uploads_data:/tmp/uploads
    networks:
      - matrah-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: matrah_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - matrah-network

networks:
  matrah-network:
    driver: bridge

volumes:
  postgres_data:
  uploads_data: # Backend ↔ ai-service arasında paylaşılan upload klasörü
