spring:
  application:
    name: matrah-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:matrah}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  cloud:
    gcp:
      storage:
        project-id: ${GCP_PROJECT_ID:your-gcp-project-id}
        # credentials:
        #   location: file:${GOOGLE_APPLICATION_CREDENTIALS}
  security:
    jwt:
      secret-key: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      expiration: 86400000 # 1 day in milliseconds
server:
  port: 8080
