spring:
  application:
    name: matrah-backend
  datasource:
    # Docker: DB_HOST=postgres  |  Cloud Run: CLOUD_SQL_INSTANCE=matrah:us-central1:matrah-db
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:matrah_db}}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 30MB
  cloud:
    gcp:
      storage:
        project-id: ${GCP_PROJECT_ID:matrah}
        credentials:
          location: classpath:gcp-key.json
  security:
    jwt:
      secret-key: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      expiration: 86400000 # 1 day in milliseconds

# AI Service bağlantısı
ai:
  service:
    url: ${AI_SERVICE_URL:http://localhost:8000/analyze}

server:
  port: ${SERVER_PORT:8080}
